title = "Bus Booking VN - Gitleaks Config"

[extend]
useDefault = true

[[rules]]
id = "vn-mobile-number"
description = "Vietnamese mobile phone number"
regex = '''\+84[35789]\d{8}'''
tags = ["phone", "PII", "VN"]

[allowlist]
description = "Placeholder/fake VN phone numbers live only in seeds, tests, and the redact util — not real PII. Real app/lib source is still scanned by the rule."
paths = [
  '''prisma/seed\.ts''',
  '''lib/audit/redactPhone\.ts''',
  '''.*__tests__.*''',
  '''.*\.test\.ts$''',
  '''e2e/.*''',
]
