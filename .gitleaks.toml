title = "Bus Booking VN - Gitleaks Config"

[extend]
useDefault = true

[[rules]]
id = "vn-mobile-number"
description = "Vietnamese mobile phone number"
regex = '''\+84[35789]\d{8}'''
tags = ["phone", "PII", "VN"]

[allowlist]
description = "Placeholder/fake VN phone numbers in seeds, tests, QA smoke artifacts, the redact util, and the shared doc-example literal — not real PII. Real app/lib source is still scanned."
regexes = [
  # Canonical fake doc-example number reused in docstrings (redactPhone, attachGuestBookingByPhone, …).
  '''\+84901234567''',
  # Fabricated SEED operator phone — used verbatim by prisma/seed.ts, the operator/auth tests,
  # the e2e specs, and the smoke crawl scripts (they log in with it, so it can't be x-masked).
  # Already path-allowlisted in those locations; allowlisting the literal also covers the commit
  # HISTORY that gitleaks-action scans (the value was introduced before its HEAD x-mask).
  '''\+84901230001''',
  # MoMo PUBLIC sandbox/test credentials — published in MoMo's official integration docs and
  # used by every integrator (the go-live guide labels them "(test)" and warns against real keys).
  # generic-api-key flags the access/secret key shapes in docs/momo-go-live.md; these are not secrets.
  '''MOMOBKUN20180529''',
  '''klm05TvNBzhg7h7j''',
  '''at67qH6mk8w5Y1nAyMoYKMWACiEi2bsa''',
  # CI-only test secrets — clearly labeled "not-for-production" in .github/workflows/ci.yml.
  # generic-api-key flags them because the env var names contain SECRET/KEY.
  '''ci-test-jwt-secret-not-for-production-use-0123456789ab''',
  '''ci-test-operator-secret-not-for-production-0123''',
  '''ci-test-admin-secret-not-for-production-01234567''',
  '''ci-test-cron-secret-00''',
  # CI-only TOTP encryption key — deterministic hex pattern, not a real key.
  '''0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef''',
]
paths = [
  '''prisma/seed\.ts''',
  '''lib/audit/redactPhone\.ts''',
  '''.*__tests__.*''',
  '''.*\.test\.ts$''',
  '''e2e/.*''',
  # Smoke crawl scripts log in with the seed phone verbatim (cannot be x-masked); the
  # QA report docs they emit print that seed phone. Fabricated seed data, not real PII.
  '''scripts/smoke/.*''',
  '''docs/qa/.*''',
  # .env.example contains only placeholder values ("replace-with-32-byte-hex"),
  # never real secrets. generic-api-key flags SECRET= and KEY= var names.
  '''\.env\.example''',
]
