title = "Bus Booking VN - Gitleaks Config"

[extend]
useDefault = true

[[rules]]
id = "vn-mobile-number"
description = "Vietnamese mobile phone number"
regex = '''\+84[35789]\d{8}'''
tags = ["phone", "PII", "VN"]

[allowlist]
description = "Placeholder/fake VN phone numbers in seeds, tests, the redact util, and the shared doc-example literal — not real PII. Real app/lib source is still scanned."
regexes = [
  # Canonical fake doc-example number reused in docstrings (redactPhone, attachGuestBookingByPhone, …).
  '''\+84901234567''',
]
paths = [
  '''prisma/seed\.ts''',
  '''lib/audit/redactPhone\.ts''',
  '''.*__tests__.*''',
  '''.*\.test\.ts$''',
  '''e2e/.*''',
]
