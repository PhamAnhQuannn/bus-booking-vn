# Nginx reverse proxy — FPT Cloud / self-hosted backup deployment only.
# Primary production on Vercel handles TLS and routing automatically (ADR-020 D11).
# Replace YOURDOMAIN.COM with your actual domain (e.g. busbooking.com)
# Replace /opt/busmap/ssl/ paths with actual cert locations

# Production — proxied from Cloudflare, origin port 3000
server {
    listen 443 ssl http2;
    server_name YOURDOMAIN.COM www.YOURDOMAIN.COM;

    ssl_certificate     /opt/busmap/ssl/origin.pem;
    ssl_certificate_key /opt/busmap/ssl/origin-key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location /api/health {
        proxy_pass http://127.0.0.1:3000;
        access_log off;
    }

    location /api/cron/ {
        allow 127.0.0.1;
        allow 172.16.0.0/12;
        deny all;
        proxy_pass http://127.0.0.1:3000;
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# Staging — proxied from Cloudflare, origin port 3001
server {
    listen 443 ssl http2;
    server_name dev.YOURDOMAIN.COM;

    ssl_certificate     /opt/busmap/ssl/origin.pem;
    ssl_certificate_key /opt/busmap/ssl/origin-key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    location /_next/static/ {
        proxy_pass http://127.0.0.1:3001;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location /api/health {
        proxy_pass http://127.0.0.1:3001;
        access_log off;
    }

    location /api/cron/ {
        allow 127.0.0.1;
        allow 172.16.0.0/12;
        deny all;
        proxy_pass http://127.0.0.1:3001;
    }

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# HTTP -> HTTPS redirect (all domains)
server {
    listen 80;
    server_name YOURDOMAIN.COM www.YOURDOMAIN.COM dev.YOURDOMAIN.COM;
    return 301 https://$host$request_uri;
}
