services:
  app:
    build: .
    env_file: .env.production
    environment:
      DATABASE_URL: "postgresql://bbvn:${POSTGRES_PASSWORD}@pgbouncer:6432/bbvn_prod"
      DIRECT_URL: "postgresql://bbvn:${POSTGRES_PASSWORD}@postgres:5432/bbvn_prod"
      NODE_ENV: production
    ports:
      - '3000:3000'
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks: [internal]

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: bbvn
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: bbvn_prod
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U bbvn -d bbvn_prod']
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks: [internal]

  pgbouncer:
    image: edoburu/pgbouncer:1.22.1
    environment:
      DATABASE_URL: "postgres://bbvn:${POSTGRES_PASSWORD}@postgres:5432/bbvn_prod"
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 200
      PGBOUNCER_DEFAULT_POOL_SIZE: 30
      AUTH_TYPE: scram-sha-256
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p 6432 -U bbvn"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks: [internal]

  redis:
    image: redis:7-alpine
    # IMPORTANT: Set REDIS_PASSWORD to a strong secret in production.
    # The default 'changeme' is only for local testing — never use it in prod.
    command: redis-server --requirepass ${REDIS_PASSWORD:-changeme}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD:-changeme}', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks: [internal]

volumes:
  postgres_data:
  redis_data:

networks:
  internal:
    driver: bridge
    internal: true
