# Production Docker Compose — FPT Cloud / self-hosted backup deployment.
# Primary production runs on Vercel Pro + Neon + Upstash (ADR-020 D11).
services:
  # NOTE: Run database migrations before starting this stack.
  # One-off command: docker compose -f docker-compose.prod.yml run --rm app pnpm prisma migrate deploy
  # Or use an external init step in your CI/CD pipeline.
  app:
    build: .
    env_file: .env.production
    environment:
      DATABASE_URL: "postgresql://bbvn:${POSTGRES_PASSWORD}@pgbouncer:6432/bbvn_prod"
      DIRECT_URL: "postgresql://bbvn:${POSTGRES_PASSWORD}@postgres:5432/bbvn_prod"
      NODE_ENV: production
    ports:
      - '3000:3000'
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks: [internal]

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: bbvn
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: bbvn_prod
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U bbvn -d bbvn_prod']
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks: [internal]

  pgbouncer:
    image: edoburu/pgbouncer:1.22.1
    environment:
      DATABASE_URL: "postgres://bbvn:${POSTGRES_PASSWORD}@postgres:5432/bbvn_prod"
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 200
      PGBOUNCER_DEFAULT_POOL_SIZE: 30
      AUTH_TYPE: scram-sha-256
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p 6432 -U bbvn"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks: [internal]

  redis:
    image: redis:7-alpine
    # REDIS_PASSWORD must be set in the environment — container fails to start without it.
    command: redis-server --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD required}
    volumes:
      - redis_data:/data
    healthcheck:
      # Pass the password so redis-cli can AUTH before PING — without -a this
      # returns "NOAUTH Authentication required" (exit 1) and the healthcheck
      # never passes, blocking the app container from starting.
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD:?REDIS_PASSWORD required}', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks: [internal]

  cron:
    image: aptible/supercronic:latest
    volumes:
      - ./deploy/crontab/crontab:/etc/supercronic/crontab:ro
    environment:
      TZ: Asia/Ho_Chi_Minh
      CRON_SECRET: ${CRON_SECRET}
    entrypoint: ["/usr/local/bin/supercronic", "/etc/supercronic/crontab"]
    depends_on:
      app:
        condition: service_started
    restart: unless-stopped
    networks: [internal]

volumes:
  postgres_data:
  redis_data:

networks:
  internal:
    driver: bridge
    internal: true
