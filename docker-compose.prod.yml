services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: bbvn
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: bbvn_prod
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U bbvn -d bbvn_prod']
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  pgbouncer:
    image: edoburu/pgbouncer:1.22.1
    environment:
      DATABASE_URL: "postgres://bbvn:${POSTGRES_PASSWORD}@postgres:5432/bbvn_prod"
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 200
      PGBOUNCER_DEFAULT_POOL_SIZE: 30
      # AUTH_TYPE scram-sha-256: safe with edoburu/pgbouncer because the image writes
      # plaintext password entries into pgbouncer.ini (via DATABASE_URL), which allows
      # pgbouncer to derive and cache SCRAM verifiers at runtime when it first connects
      # to Postgres. Client connections to pgbouncer are then authenticated end-to-end
      # as SCRAM-SHA-256. No plaintext passwords are transmitted on the wire.
      AUTH_TYPE: scram-sha-256
    ports:
      - '6432:6432'
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p 6432 -U bbvn"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile
    # Inject all secrets via .env.production (never commit real values to version control).
    # Generate each secret with: node -e "console.log(require('crypto').randomBytes(32).toString('hex'))"
    # REQUIRED secrets (env.ts superRefine enforces these when NODE_ENV=production):
    #   HOLD_SECRET           -- HMAC-SHA256 key for bb_hold cookies (min 64 hex chars)
    #   JWT_SECRET            -- HS256 key for customer session JWTs (min 32 chars)
    #   JWT_OPERATOR_SECRET   -- HS256 key for operator session JWTs (min 32 chars)
    #   JWT_ADMIN_SECRET      -- HS256 key for admin session JWTs (min 32 chars)
    #   TOTP_ENCRYPTION_KEY   -- AES-256-GCM key for admin TOTP secrets (64 hex chars)
    #   CRON_SECRET           -- Bearer token for cron route Authorization header (min 16 chars)
    env_file: .env.production
    environment:
      DATABASE_URL: "postgresql://bbvn:${POSTGRES_PASSWORD}@pgbouncer:6432/bbvn_prod"
      DIRECT_URL: "postgresql://bbvn:${POSTGRES_PASSWORD}@postgres:5432/bbvn_prod"
      NODE_ENV: production
    ports:
      - '3000:3000'
    depends_on:
      pgbouncer:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data: