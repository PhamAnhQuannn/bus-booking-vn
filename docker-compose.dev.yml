
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: bbvn
      POSTGRES_PASSWORD: bbvn_dev_password
      POSTGRES_DB: bbvn_dev
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U bbvn -d bbvn_dev']
      interval: 5s
      timeout: 5s
      retries: 5

  postgres_shadow:
    image: postgres:16
    environment:
      POSTGRES_USER: bbvn
      POSTGRES_PASSWORD: bbvn_dev_password
      POSTGRES_DB: bbvn_shadow
    ports:
      - '5434:5432'
    volumes:
      - postgres_shadow_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U bbvn -d bbvn_shadow']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  postgres_shadow_data:
