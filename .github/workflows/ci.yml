name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '10'

jobs:
  # ---- 1. Lint + typecheck ----
  lint-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm prisma generate
        env:
          DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm tsc --noEmit

  # ---- 2. Unit tests ----
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm prisma generate
        env:
          DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder

      - name: Run unit tests
        run: pnpm test:unit

      - name: Run coverage
        run: pnpm test:cov

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-lcov
          path: coverage/lcov.info
          retention-days: 7

  # ---- 3. Integration tests (real postgres:16) ----
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: bbvn
          POSTGRES_PASSWORD: bbvn_dev_password
          POSTGRES_DB: bbvn_dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://bbvn:bbvn_dev_password@localhost:5432/bbvn_dev
      SHADOW_DATABASE_URL: postgresql://bbvn:bbvn_dev_password@localhost:5432/bbvn_shadow
      # Test-only secret (64 hex) — required by lib/config/env.ts (no default).
      HOLD_SECRET: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
      # Refund/payment PSP is a stub until go-live (#094); without this the refund
      # rail throws PspRefundNotImplementedError. The Issue-051 refundOut integration
      # test (via cancelTrip) needs the stub. The e2e job already sets this.
      PAYMENTS_STUB: 'true'

    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm prisma generate

      - name: Create shadow database
        run: psql "$DATABASE_URL" -c "CREATE DATABASE bbvn_shadow;" || true
        env:
          PGPASSWORD: bbvn_dev_password

      - name: Run migrations
        run: pnpm prisma migrate deploy

      - name: Seed database
        run: pnpm prisma db seed

      - name: Run integration tests
        run: pnpm vitest:int

  # ---- 4. E2E tests (Playwright, mobile-390) ----
  e2e-tests:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        project: [chromium, mobile-390]
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: bbvn
          POSTGRES_PASSWORD: bbvn_dev_password
          POSTGRES_DB: bbvn_dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://bbvn:bbvn_dev_password@localhost:5432/bbvn_dev
      PLAYWRIGHT_BASE_URL: http://localhost:3001
      # Test-only secret (64 hex) — required by lib/config/env.ts (no default).
      HOLD_SECRET: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
      # Route online payments through the local stub gateway for e2e.
      PAYMENTS_STUB: 'true'
      # pnpm build sets NODE_ENV=production; env.ts superRefine requires these.
      JWT_SECRET: ci-test-jwt-secret-not-for-production-use-0123456789ab
      JWT_OPERATOR_SECRET: ci-test-operator-secret-not-for-production-0123
      JWT_ADMIN_SECRET: ci-test-admin-secret-not-for-production-01234567
      TOTP_ENCRYPTION_KEY: '0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef'
      CRON_SECRET: ci-test-cron-secret-00
      REFRESH_TOKEN_SECRET: ci-test-refresh-secret-not-for-prod-0123
      BANK_ENCRYPTION_KEY: '0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef'
      TICKET_SECRET: ci-test-ticket-secret-not-for-prod

    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm prisma generate

      - name: Run migrations
        run: pnpm prisma migrate deploy

      - name: Seed database
        run: pnpm prisma db seed

      - name: Install Playwright browsers
        # mobile-390 uses devices['iPhone SE'] → WebKit; chromium keeps the desktop project covered.
        run: pnpm exec playwright install --with-deps chromium webkit

      - name: Build Next.js app
        run: pnpm build

      - name: Run E2E tests
        run: pnpm exec playwright test --project=${{ matrix.project }}
        env:
          CI: true

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  # ---- 4b. Quarantine lane (non-blocking) ----
  flaky-e2e:
    name: Flaky E2E Quarantine
    runs-on: ubuntu-latest
    continue-on-error: true
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: bbvn
          POSTGRES_PASSWORD: bbvn_dev_password
          POSTGRES_DB: bbvn_dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://bbvn:bbvn_dev_password@localhost:5432/bbvn_dev
      PLAYWRIGHT_BASE_URL: http://localhost:3001
      HOLD_SECRET: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
      PAYMENTS_STUB: 'true'
      JWT_SECRET: ci-test-jwt-secret-not-for-production-use-0123456789ab
      JWT_OPERATOR_SECRET: ci-test-operator-secret-not-for-production-0123
      JWT_ADMIN_SECRET: ci-test-admin-secret-not-for-production-01234567
      TOTP_ENCRYPTION_KEY: '0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef'
      CRON_SECRET: ci-test-cron-secret-00
      REFRESH_TOKEN_SECRET: ci-test-refresh-secret-not-for-prod-0123
      BANK_ENCRYPTION_KEY: '0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef'
      TICKET_SECRET: ci-test-ticket-secret-not-for-prod

    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm prisma generate

      - name: Run migrations
        run: pnpm prisma migrate deploy

      - name: Seed database
        run: pnpm prisma db seed

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium webkit

      - name: Build Next.js app
        run: pnpm build

      - name: Run flaky E2E quarantine lane
        run: pnpm exec playwright test --grep @flaky --project=chromium --pass-with-no-tests
        env:
          CI: true

  # ---- 5. Data leak audit (static grep) ----
  data-leak-audit:
    name: Data Leak Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Run data-leak grep audit
        run: bash scripts/audit/data-leak-grep.sh

  # ---- 6. Dependency audit ----
  dep-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit production dependencies
        run: pnpm audit --prod --audit-level=critical --ignore-registry-errors

  # ---- 7. Greppable invariants (KG-14) ----
  greppable-invariants:
    name: Greppable Invariants
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Run greppable invariants G1-G6
        run: bash scripts/audit/greppable-invariants.sh

  # ---- 8. Secret scanning (gitleaks) ----
  gitleaks:
    name: Secret Scanning (gitleaks)
    runs-on: ubuntu-latest
    # gitleaks-action@v2 reads PR commits on pull_request events — needs PR read.
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v3
        # v2 has no `args` input (it warned "Unexpected input(s) 'args'"); it
        # auto-detects the repo .gitleaks.toml. Point at it explicitly via env.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml
